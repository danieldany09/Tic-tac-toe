###############################################################################
# docker-compose.yml  –  LOCAL DEVELOPMENT
###############################################################################

services:

  postgres:
    image: postgres:16-alpine
    platform: linux/amd64
    container_name: tictactoe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 10

  nakama:
    image: heroiclabs/nakama:3.21.1
    platform: linux/amd64
    container_name: tictactoe-nakama
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - "/nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama && exec /nakama/nakama --name nakama1 --database.address postgres:localdb@postgres:5432/nakama --runtime.path /nakama/data/modules --console.username admin --console.password adminpassword --logger.level INFO --session.token_expiry_sec 3600 --session.refresh_token_expiry_sec 2592000"
    volumes:
      - ./nakama-data/modules:/nakama/data/modules
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7350/"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
